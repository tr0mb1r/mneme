name: release

# Tag-triggered release pipeline.
#
# When a `v*.*.*` tag is pushed, cross-build the five release targets
# (same matrix as cross-build.yml), package the binary + README + LICENSE
# into per-target archives with sha256 sums, and attach them to a GitHub
# Release for the tag.
#
# This workflow is the public-facing artefact pipeline; the
# Conventional-Commits → version-bump path is owned by `release-plz.yml`.
# A typical release flow:
#
#   1. Land work on `main` via PR.
#   2. release-plz.yml opens a "release PR" that bumps Cargo.toml +
#      updates CHANGELOG.md from the commits since the previous release.
#   3. Review and merge the release PR.
#   4. Tag the merge commit:
#        v="$(awk -F'"' '/^version/{print $2; exit}' Cargo.toml)"
#        git tag "v${v}" && git push origin "v${v}"
#   5. This workflow runs on the tag push and ships the binaries.
#
# Crate publication to crates.io is intentionally NOT done here —
# release-plz.toml sets `publish = false` until the v1.0 gate clears.
#
# The Homebrew tap (`tr0mb1r/homebrew-mneme`) is bumped from this
# workflow's `tap-bump` job: after the GitHub Release is up, that
# job rewrites `Formula/mneme.rb` against the new sha256 sidecars
# and opens a PR. The PR has to be merged manually so the user
# stays in the loop on what brew users see — this is the explicit
# "publish to brew" gate.
#
# Setup (one-time): create a fine-grained PAT scoped to
# `tr0mb1r/homebrew-mneme` with `Contents: R/W` and
# `Pull requests: R/W`, store it in this repo as the
# `HOMEBREW_TAP_TOKEN` secret. A GitHub App token with the same
# scopes works equally well.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build the release for, e.g. v0.2.0'
        required: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write   # creating the GitHub Release and uploading assets

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          version="${ref#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          stage="mneme-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/mneme" "dist/${stage}/"
          cp README.md LICENSE "dist/${stage}/"
          cp CHANGELOG.md "dist/${stage}/" 2>/dev/null || true
          (cd dist && tar -czf "${stage}.tar.gz" "${stage}")
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256")
          fi
          rm -rf "dist/${stage}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = "mneme-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/mneme.exe" "dist/$stage/"
          Copy-Item README.md, LICENSE "dist/$stage/"
          if (Test-Path CHANGELOG.md) { Copy-Item CHANGELOG.md "dist/$stage/" }
          Compress-Archive -Path "dist/$stage" -DestinationPath "dist/$stage.zip"
          $hash = (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $stage.zip" | Out-File "dist/$stage.zip.sha256" -Encoding ascii -NoNewline
          Remove-Item -Recurse -Force "dist/$stage"

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: mneme-${{ matrix.target }}
          path: |
            dist/mneme-*.tar.gz
            dist/mneme-*.tar.gz.sha256
            dist/mneme-*.zip
            dist/mneme-*.zip.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          version="${ref#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"

      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artefacts
        run: ls -la dist

      - name: Extract changelog section for this version
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.ver.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v v="$ver" '
              /^## \[/ {
                if (in_section) exit
                if (index($0, "[" v "]")) { in_section = 1; print; next }
              }
              in_section { print }
            ' CHANGELOG.md > .release-notes.md || true
          fi
          if [ -s .release-notes.md ]; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          draft: false
          # Pre-1.0 tags (v0.x.y) are tagged as prereleases on GitHub
          # so installers and homebrew formulae can opt out by default.
          # Flip to `false` once 1.0 ships.
          prerelease: ${{ startsWith(steps.ver.outputs.tag, 'v0.') }}
          generate_release_notes: ${{ steps.notes.outputs.have_notes != 'true' }}
          body_path: ${{ steps.notes.outputs.have_notes == 'true' && '.release-notes.md' || '' }}
          files: |
            dist/mneme-*.tar.gz
            dist/mneme-*.tar.gz.sha256
            dist/mneme-*.zip
            dist/mneme-*.zip.sha256

  tap-bump:
    name: Bump Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Verify token is set
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set. See release.yml header for setup."
            exit 1
          fi

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          version="${ref#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: tr0mb1r/homebrew-mneme
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Fetch sha256 sidecars
        id: sha
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          VER: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          base="https://github.com/tr0mb1r/mneme/releases/download/${TAG}"
          for arch in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-musl x86_64-unknown-linux-musl; do
            file="mneme-${VER}-${arch}.tar.gz.sha256"
            sha=$(curl -fsSL "${base}/${file}" | awk '{print $1}')
            if ! [[ "${sha}" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error::invalid sha256 for ${arch}: '${sha}'"
              exit 1
            fi
            slug="${arch//-/_}"
            echo "${slug}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Rewrite formula
        env:
          VER: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          SHA_AARCH64_APPLE_DARWIN: ${{ steps.sha.outputs.aarch64_apple_darwin }}
          SHA_X86_64_APPLE_DARWIN: ${{ steps.sha.outputs.x86_64_apple_darwin }}
          SHA_AARCH64_UNKNOWN_LINUX_MUSL: ${{ steps.sha.outputs.aarch64_unknown_linux_musl }}
          SHA_X86_64_UNKNOWN_LINUX_MUSL: ${{ steps.sha.outputs.x86_64_unknown_linux_musl }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, pathlib, sys

          ver = os.environ["VER"]
          tag = os.environ["TAG"]
          shas = {
              "aarch64-apple-darwin":       os.environ["SHA_AARCH64_APPLE_DARWIN"],
              "x86_64-apple-darwin":        os.environ["SHA_X86_64_APPLE_DARWIN"],
              "aarch64-unknown-linux-musl": os.environ["SHA_AARCH64_UNKNOWN_LINUX_MUSL"],
              "x86_64-unknown-linux-musl":  os.environ["SHA_X86_64_UNKNOWN_LINUX_MUSL"],
          }
          path = pathlib.Path("tap/Formula/mneme.rb")
          src = path.read_text()
          for arch, sha in shas.items():
              pat = re.compile(
                  r'url "https://github\.com/tr0mb1r/mneme/releases/download/v[^/"]+/'
                  r'mneme-[^"]+-' + re.escape(arch) + r'\.tar\.gz"\n'
                  r'(\s+)sha256 "[0-9a-f]{64}"',
                  re.MULTILINE,
              )
              repl = (
                  f'url "https://github.com/tr0mb1r/mneme/releases/download/{tag}/'
                  f'mneme-{ver}-{arch}.tar.gz"\n'
                  f'\\g<1>sha256 "{sha}"'
              )
              src, n = pat.subn(repl, src)
              if n != 1:
                  sys.exit(f"expected exactly 1 match for {arch}, got {n}")
          path.write_text(src)
          PY

          if git -C tap diff --quiet Formula/mneme.rb; then
            echo "::error::formula already at ${TAG} (no changes after rewrite); refusing to open empty PR"
            exit 1
          fi
          git -C tap diff Formula/mneme.rb

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VER: ${{ steps.ver.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="bump/${TAG}"
          # If a previous run left the branch around, replace it.
          git push origin --delete "${branch}" 2>/dev/null || true
          git checkout -b "${branch}"
          git add Formula/mneme.rb
          git commit -m "chore(formula): bump mneme to ${TAG}"
          git push -u origin "${branch}"
          gh pr create \
            --repo tr0mb1r/homebrew-mneme \
            --base main \
            --head "${branch}" \
            --title "chore(formula): bump mneme to ${TAG}" \
            --body "Auto-bump from the mneme release pipeline ([run](${RUN_URL})).

          Tracks https://github.com/tr0mb1r/mneme/releases/tag/${TAG}.
          sha256s pulled from the .sha256 sidecars on that GitHub Release.

          Merge to publish ${VER} to brew users."
