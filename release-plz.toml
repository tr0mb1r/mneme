# release-plz config — see https://release-plz.dev/docs/config
#
# Pre-1.0 strategy:
#
#   1. release-plz opens a release PR on every push to `main` whose
#      commits include a `feat:` / `fix:` / `BREAKING CHANGE` since the
#      last release. The PR bumps `Cargo.toml` `package.version` and
#      regenerates `CHANGELOG.md`.
#   2. After merging the release PR, push a tag manually:
#        v="$(awk -F'"' '/^version/{print $2; exit}' Cargo.toml)"
#        git tag "v${v}" && git push origin "v${v}"
#      The tag triggers `.github/workflows/release.yml`, which cross-
#      builds the five release targets and creates the GitHub Release
#      with binaries + sha256 sums.
#   3. After the tag is verified, publish to crates.io manually via the
#      `publish.yml` workflow:
#        gh workflow run publish.yml --field tag=v${v}
#      That workflow uses OIDC trusted publishing (no long-lived token).
#      `publish = false` below keeps release-plz from publishing
#      automatically on PR merge — the explicit workflow_dispatch is the
#      only trigger for crates.io.
#
# Disabling `git_tag_enable` and `git_release_enable` here keeps the
# release-PR-merge step from racing the cross-build pipeline. Only the
# explicit `git push origin v*.*.*` should trigger `release.yml`.

[workspace]
publish = false
git_tag_enable = false
git_release_enable = false
# Don't run `cargo publish --dry-run` either — it tries to network out
# to crates.io and adds nothing pre-1.0.
publish_no_verify = true

[changelog]
header = """# Changelog

All notable changes to mneme are documented here. The format follows
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and the
project adheres to [Semantic Versioning](https://semver.org/) — see
[`book/src/versioning.md`](book/src/versioning.md) for the project's
pre-1.0 cadence and 1.0 gates.

"""

# Conventional Commits → CHANGELOG sections. Keep this stable: changing
# group names mid-release-cycle reflows existing CHANGELOG entries on
# the next regeneration and creates noisy diffs.
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Changed" },
    { message = "^refactor", group = "Changed" },
    { message = "^sec", group = "Security" },
    { message = "^docs", group = "Documentation" },
    { message = "^chore", skip = true },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
]

# Surface BREAKING CHANGE footers prominently. Pre-1.0 these become a
# `0.MINOR.0` bump per book/src/versioning.md; post-1.0 they become a
# MAJOR bump.
protect_breaking_commits = true
sort_commits = "newest"

[[package]]
name = "mneme-mcp"
changelog_update = true
# The semver bump-level rules below mirror book/src/versioning.md.
# Pre-1.0 release-plz interprets `feat!` / `BREAKING CHANGE` as a
# 0.MINOR bump (Cargo's pre-1.0 SemVer convention); post-1.0 the same
# triggers MAJOR.
#
# `semver_check` is OFF pre-1.0. The motivating false positive: v0.2.6
# touched `Forget::new`'s arity to wire L0 + L3 stores into the
# `forget` MCP tool. That constructor is internal (only called from
# `src/mcp/tools/mod.rs::defaults_with_schedulers`), but it was
# accidentally `pub`, so cargo-semver-checks classed the arity change
# as a public-API break and release-plz proposed a 0.3.0 MINOR bump
# for what is plainly a PATCH-shaped bug fix. Repeat misfires would
# erode the meaningful signal and force noisy ad-hoc bumps.
#
# The contract that actually matters pre-1.0 is the MCP wire surface
# documented in `book/src/mcp-surface.md` (13 tools + 5 resources,
# frozen for v1.0 per pin 01KQM0VE4BW95RYKWD1SEEHXCP). The Rust
# library API has no external consumers — the crate publishes a
# binary, not a library worth depending on. Re-enable `semver_check`
# at the v1.0 cutover, when the Rust API surface freezes alongside
# the MCP one. Internal tool constructors should be `pub(crate)` going
# forward (see `Forget` in `src/mcp/tools/forget.rs` for the pattern)
# so they don't leak into the apparent public surface either way.
semver_check = false
