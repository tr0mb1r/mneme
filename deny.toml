[graph]
all-features = false
no-default-features = false

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
ignore = [
    # `atomic-polyfill` is upstream-archived (deprecated in favour of
    # `portable-atomic`). Pulled transitively via the candle / heapless
    # graph; no known security vulnerability, just unmaintained.
    # Revisit when an upstream we depend on cuts a release that drops
    # the dep.
    "RUSTSEC-2023-0089",
    # `paste` is upstream-archived. Pulled transitively via candle's
    # macro graph; no known security vulnerability. Same revisit
    # criterion as above.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    # CDLA-Permissive-2.0: webpki-roots ships Mozilla's CA bundle
    # under this license. Permissive (no copyleft), explicitly
    # OSI-recognised category. Acceptable for this project.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
